<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnilytic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/app.css">
</head>
<body>
    <div class="page-shell">
        <header class="app-header">
            <div class="app-header-top">
                <a class="brand" href="/">
                    <span class="brand-mark">OM</span>
                    <span class="brand-copy">
                        <strong>Omnilytic</strong>
                        <span>Аналитика маркетплейсов</span>
                    </span>
                </a>

                <nav class="page-nav" aria-label="Разделы">
                    <button type="button" class="page-nav-link active" data-page="command">Командный центр</button>
                    <button type="button" class="page-nav-link" data-page="unit">Юнит-экономика</button>
                    <button type="button" class="page-nav-link" data-page="geo">Гео-аналитика</button>
                </nav>

                <div class="header-actions">
                    <div id="fileInfo" class="file-loaded" style="display:none;">
                        <span class="status-dot"></span>
                        <span id="fileName"></span>
                    </div>
                    <button type="button" class="wb-api-toggle" id="wbApiToggle" onclick="toggleWbApiPanel()">Загрузить API-токен</button>
                    <button type="button" class="reset-btn" id="resetBtn" onclick="resetData()">Сбросить данные</button>
                </div>
            </div>

            <div class="app-header-bottom">
                <div id="headerFilters" class="header-filters"></div>
            </div>

            <div class="wb-api-bar" id="wbApiBar">
                <div class="wb-api-row">
                    <div class="wb-api-field">
                        <label for="wbApiKey">WB API токен</label>
                        <input type="password" id="wbApiKey" placeholder="Вставьте персональный токен">
                    </div>
                    <button type="button" class="wb-api-btn" id="wbApiFetchBtn" onclick="fetchFromWbApi()">Загрузить</button>
                </div>
                <div id="wbApiStatus" class="wb-api-status"></div>
            </div>
        </header>

        <main class="app-main">
            <section id="commandPage" class="page-section active">
                <div id="commandContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">OM</div>
                        <div class="empty-state-title">Загрузите данные</div>
                        <p>Подтяните данные через WB API, чтобы заполнить командный центр.</p>
                    </div>
                </div>
            </section>

            <section id="unitPage" class="page-section">
                <div id="unitEconomicsContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">UE</div>
                        <div class="empty-state-title">Юнит-экономика готова к заполнению</div>
                        <p>После загрузки данных выберите один товар и период, чтобы собрать экономический состав товара.</p>
                    </div>
                </div>
            </section>

            <section id="geoPage" class="page-section">
                <div id="geoAnalyticsContent"></div>
            </section>
        </main>
    </div>

    <script defer src="static/js/state.js"></script>
    <script defer src="static/js/render-command.js"></script>
    <script defer src="static/js/render-unit-economics.js"></script>
    <script defer src="static/js/api.js"></script>
    <script defer src="static/js/main.js"></script>
</body>
</html>
