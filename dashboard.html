<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnilytic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/app.css">
</head>
<body>
    <div class="page-shell">
        <header class="top-nav">
            <a class="brand" href="/">
                <span class="brand-mark">OM</span>
                <span class="brand-copy"><strong>Omnilytic</strong></span>
            </a>
            <div class="header-actions">
                <div id="fileInfo" class="file-loaded" style="display: none;">
                    <span class="status-dot"></span>
                    <span id="fileName"></span>
                </div>
                <label class="upload-zone" id="uploadZone">
                    <input type="file" accept=".xlsx,.xls" id="fileInput">
                    <span>[+] Excel</span>
                </label>
                <button class="wb-api-toggle" id="wbApiToggle" onclick="toggleWbApiPanel()">[~] WB API</button>
            </div>
        </header>

        <div class="wb-api-bar" id="wbApiBar">
            <div class="wb-api-row">
                <div class="wb-api-field">
                    <label>API ключ</label>
                    <input type="password" id="wbApiKey" placeholder="Токен WB API">
                </div>
                <button class="wb-api-btn" id="wbApiFetchBtn" onclick="fetchFromWbApi()">Загрузить</button>
            </div>
            <div id="wbApiStatus" class="wb-api-status"></div>
        </div>

        <nav class="tabs" aria-label="Разделы дашборда">
            <button class="tab active" data-tab="command">[+] Командный центр</button>
            <button class="tab" data-tab="matrix">[x] Матрица решений</button>
            <button class="tab" data-tab="actions">[-] План действий</button>
        </nav>

        <main>
            <section id="command" class="tab-content active">
                <div id="commandContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">OM</div>
                        <div class="empty-state-title">Загрузите данные</div>
                        <p>Перетащите Excel-файл или используйте WB API, чтобы заполнить дашборд.</p>
                    </div>
                </div>
            </section>

            <section id="matrix" class="tab-content">
                <div id="matrixContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">4x4</div>
                        <div class="empty-state-title">Матрица появится после загрузки</div>
                    </div>
                </div>
            </section>

            <section id="actions" class="tab-content">
                <div id="actionsContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">GO</div>
                        <div class="empty-state-title">План действий появится после анализа</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script defer src="static/js/state.js"></script>
    <script defer src="static/js/render-command.js"></script>
    <script defer src="static/js/render-matrix.js"></script>
    <script defer src="static/js/render-actions.js"></script>
    <script defer src="static/js/export.js"></script>
    <script defer src="static/js/api.js"></script>
    <script defer src="static/js/main.js"></script>
</body>
</html>
