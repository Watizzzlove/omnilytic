<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WB Sales Intelligence Dashboard</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.9);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-yellow: #f59e0b;
            --accent-red: #ef4444;
            --accent-cyan: #06b6d4;
            --border-color: rgba(148, 163, 184, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1e1b4b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px;
        }
        .container { max-width: 1500px; margin: 0 auto; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border-color); }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent-purple), #ec4899); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .logo h1 { font-size: 24px; background: linear-gradient(135deg, var(--text-primary), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo span { font-size: 12px; color: var(--text-muted); }

        /* Upload */
        .upload-zone { padding: 16px 32px; background: var(--bg-card); border: 2px dashed var(--border-color); border-radius: 12px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 12px; color: var(--text-secondary); }
        .upload-zone:hover { border-color: var(--accent-purple); }
        .upload-zone.dragover { border-color: var(--accent-green); background: rgba(16, 185, 129, 0.1); }
        .upload-zone input { display: none; }
        .file-loaded { padding: 12px 20px; background: rgba(16, 185, 129, 0.1); border-radius: 12px; color: var(--accent-green); font-size: 14px; display: flex; align-items: center; gap: 8px; }

        /* WB API Panel */
        .wb-api-panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; margin-bottom: 24px; display: none; }
        .wb-api-panel.visible { display: block; }
        .wb-api-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .wb-api-field { display: flex; flex-direction: column; gap: 4px; }
        .wb-api-field label { font-size: 12px; color: var(--text-muted); }
        .wb-api-field input { padding: 10px 14px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 13px; outline: none; }
        .wb-api-field input:focus { border-color: var(--accent-purple); }
        .wb-api-field input[type="date"] { cursor: pointer; }
        .wb-api-btn { padding: 10px 24px; background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue)); border: none; border-radius: 8px; color: white; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
        .wb-api-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4); }
        .wb-api-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .wb-api-toggle { padding: 8px 16px; background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(59, 130, 246, 0.2)); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 8px; color: var(--accent-purple); font-size: 13px; cursor: pointer; transition: all 0.3s; }
        .wb-api-toggle:hover { background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(59, 130, 246, 0.3)); }
        .wb-api-toggle.active { background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue)); color: white; }

        /* Tabs */
        .tabs { display: flex; gap: 8px; padding: 6px; background: var(--bg-card); border-radius: 16px; width: fit-content; margin-bottom: 24px; }
        .tab { padding: 12px 24px; background: transparent; border: none; border-radius: 12px; color: var(--text-secondary); font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .tab:hover { color: var(--text-primary); background: var(--bg-secondary); }
        .tab.active { background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue)); color: white; }

        /* KPI Grid */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .kpi-grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 24px; }
        .kpi-card { background: var(--bg-card); border-radius: 16px; padding: 18px; border: 1px solid var(--border-color); position: relative; }
        .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); border-radius: 16px 16px 0 0; }
        .kpi-card.positive::before { background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan)); }
        .kpi-card.negative::before { background: linear-gradient(90deg, var(--accent-red), var(--accent-yellow)); }
        .kpi-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
        .kpi-value { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .kpi-dynamics { font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .kpi-dynamics.positive { color: var(--accent-green); }
        .kpi-dynamics.negative { color: var(--accent-red); }
        .kpi-prev { font-size: 11px; color: var(--text-muted); }
        .kpi-diff { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 4px; }
        .kpi-diff.positive { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
        .kpi-diff.negative { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }

        /* Cards */
        .card { background: var(--bg-card); border-radius: 16px; padding: 24px; border: 1px solid var(--border-color); margin-bottom: 24px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }

        /* AI Block */
        .ai-block { background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(59, 130, 246, 0.1)); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .ai-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .ai-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .ai-content { color: var(--text-secondary); line-height: 1.7; white-space: pre-wrap; }
        .ai-button { margin-top: 16px; padding: 12px 24px; background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue)); border: none; border-radius: 12px; color: white; font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .ai-button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4); }
        .ai-button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border-color); }
        td { padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 13px; }
        tr:hover { background: rgba(51, 65, 85, 0.5); }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; }
        .badge-success { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
        .badge-warning { background: rgba(245, 158, 11, 0.2); color: var(--accent-yellow); }
        .badge-danger { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
        .badge-info { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }

        /* BCG Matrix */
        .bcg-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .bcg-card { background: var(--bg-card); border-radius: 16px; padding: 20px; border: 1px solid var(--border-color); }
        .bcg-card.star { border-color: rgba(251, 191, 36, 0.3); }
        .bcg-card.question { border-color: rgba(139, 92, 246, 0.3); }
        .bcg-card.cash_cow { border-color: rgba(16, 185, 129, 0.3); }
        .bcg-card.dog { border-color: rgba(148, 163, 184, 0.3); }
        .bcg-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .bcg-icon { font-size: 28px; }
        .bcg-stats { display: flex; gap: 24px; }
        .bcg-stat-value { font-size: 24px; font-weight: 700; }
        .bcg-stat-label { font-size: 12px; color: var(--text-muted); }

        /* Actions */
        .action-card { background: var(--bg-secondary); border-radius: 12px; padding: 16px; margin-bottom: 12px; border-left: 4px solid transparent; }
        .action-card.critical { border-left-color: var(--accent-red); }
        .action-card.important { border-left-color: var(--accent-yellow); }
        .action-card.opportunities { border-left-color: var(--accent-green); }
        .action-title { font-weight: 600; margin-bottom: 4px; }
        .action-desc { font-size: 13px; color: var(--text-secondary); }
        .action-meta { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
        .action-potential { color: var(--accent-green); font-weight: 600; }

        /* Funnel */
        .funnel-step { display: flex; align-items: center; margin-bottom: 10px; }
        .funnel-bar { height: 44px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue)); border-radius: 8px; display: flex; align-items: center; padding: 0 16px; color: white; font-weight: 500; justify-content: space-between; min-width: 120px; }
        .funnel-meta { display: flex; gap: 12px; margin-left: 16px; font-size: 12px; }
        .funnel-dynamics { padding: 2px 8px; border-radius: 4px; }
        .funnel-dynamics.positive { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
        .funnel-dynamics.negative { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }

        /* Empty state */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state-title { font-size: 18px; color: var(--text-primary); margin-bottom: 8px; }

        /* Loading */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--bg-secondary); border-top-color: var(--accent-purple); border-radius: 50%; animation: spin 1s linear infinite; }

        /* Tab content */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Responsive */
        @media (max-width: 1200px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } .kpi-grid-6 { grid-template-columns: repeat(3, 1fr); } .grid-2, .grid-3 { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .kpi-grid, .kpi-grid-6 { grid-template-columns: 1fr; } .header { flex-direction: column; gap: 16px; } .bcg-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">📊</div>
                <div>
                    <h1>WB Sales Intelligence</h1>
                    <span>AI-powered analytics dashboard</span>
                </div>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <div id="fileInfo" class="file-loaded" style="display: none;">
                    <span>✓</span> <span id="fileName"></span>
                </div>
                <label class="upload-zone" id="uploadZone">
                    <input type="file" accept=".xlsx,.xls" id="fileInput">
                    <span>📁</span> Excel
                </label>
                <button class="wb-api-toggle" id="wbApiToggle" onclick="toggleWbApiPanel()">🔗 WB API</button>
            </div>
        </header>

        <!-- WB API Panel -->
        <div class="wb-api-panel" id="wbApiPanel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <div style="font-weight: 600; display: flex; align-items: center; gap: 8px;">🔗 Загрузка из WB API</div>
                <span style="font-size: 12px; color: var(--text-muted);">Sales Funnel API v3</span>
            </div>
            <div class="wb-api-row">
                <div class="wb-api-field" style="flex: 1; min-width: 200px;">
                    <label>API ключ (категория Аналитика)</label>
                    <input type="password" id="wbApiKey" placeholder="Вставьте ваш WB API токен">
                    <div style="display: flex; align-items: center; gap: 6px; margin-top: 4px;">
                        <input type="checkbox" id="wbSaveKey" checked style="accent-color: var(--accent-purple);">
                        <label for="wbSaveKey" style="font-size: 11px; color: var(--text-muted); cursor: pointer;">Запомнить ключ в браузере</label>
                    </div>
                </div>
                <div class="wb-api-field">
                    <label>Период с</label>
                    <input type="date" id="wbDateFrom">
                </div>
                <div class="wb-api-field">
                    <label>Период по</label>
                    <input type="date" id="wbDateTo">
                </div>
                <button class="wb-api-btn" id="wbApiFetchBtn" onclick="fetchFromWbApi()">📊 Загрузить</button>
            </div>
            <div id="wbApiStatus" style="margin-top: 12px; font-size: 13px; display: none;"></div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="command">📊 Командный центр</button>
            <button class="tab" data-tab="matrix">📈 Матрица решений</button>
            <button class="tab" data-tab="actions">⚡ Action Dashboard</button>
        </div>

        <div id="command" class="tab-content active">
            <div id="commandContent">
                <div class="empty-state">
                    <div class="empty-state-icon">📊</div>
                    <div class="empty-state-title">Загрузите данные</div>
                    <p>Перетащите Excel-файл или нажмите «WB API» для загрузки из Wildberries</p>
                </div>
            </div>
        </div>

        <div id="matrix" class="tab-content">
            <div id="matrixContent">
                <div class="empty-state">
                    <div class="empty-state-icon">📈</div>
                    <div class="empty-state-title">Загрузите данные</div>
                </div>
            </div>
        </div>

        <div id="actions" class="tab-content">
            <div id="actionsContent">
                <div class="empty-state">
                    <div class="empty-state-icon">⚡</div>
                    <div class="empty-state-title">Загрузите данные</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Автоопределение API URL (локально, file:// или на сервере)
        const API_BASE = (window.location.protocol === 'file:'
            || window.location.hostname === 'localhost'
            || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:8000'
            : window.location.origin;
        let dashboardData = null;

        // Helpers
        const formatNumber = (n) => n?.toLocaleString('ru-RU') || '0';
        const formatCurrency = (n) => {
            if (!n && n !== 0) return '0 ₽';
            if (Math.abs(n) >= 1000000) return `${(n/1000000).toFixed(1)}M ₽`;
            if (Math.abs(n) >= 1000) return `${Math.round(n/1000)}K ₽`;
            return `${formatNumber(n)} ₽`;
        };
        const formatDiff = (n) => {
            if (!n && n !== 0) return '';
            const sign = n > 0 ? '+' : '';
            if (Math.abs(n) >= 1000000) return `${sign}${(n/1000000).toFixed(1)}M`;
            if (Math.abs(n) >= 1000) return `${sign}${Math.round(n/1000)}K`;
            return `${sign}${formatNumber(n)}`;
        };
        const formatDynamics = (n, suffix = '%') => `${n > 0 ? '+' : ''}${n?.toFixed(1) || 0}${suffix}`;
        const formatPct = (n) => `${n?.toFixed(1) || 0}%`;
        const dynClass = (n) => n > 0 ? 'positive' : n < 0 ? 'negative' : '';

        // Tabs
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });

        // Set default dates for WB API (last 7 days) + restore saved key
        (function initWbApi() {
            const today = new Date();
            const weekAgo = new Date(today);
            weekAgo.setDate(today.getDate() - 7);
            const fmt = d => d.toISOString().split('T')[0];
            document.getElementById('wbDateTo').value = fmt(today);
            document.getElementById('wbDateFrom').value = fmt(weekAgo);

            // Restore saved API key
            const savedKey = localStorage.getItem('wb_api_key');
            if (savedKey) {
                document.getElementById('wbApiKey').value = savedKey;
            }
        })();

        // WB API panel toggle
        function toggleWbApiPanel() {
            const panel = document.getElementById('wbApiPanel');
            const btn = document.getElementById('wbApiToggle');
            panel.classList.toggle('visible');
            btn.classList.toggle('active');
        }

        // Fetch from WB API
        async function fetchFromWbApi() {
            const apiKeyEl = document.getElementById('wbApiKey');
            const apiKey = apiKeyEl.value.trim();
            const dateFrom = document.getElementById('wbDateFrom').value;
            const dateTo = document.getElementById('wbDateTo').value;
            const statusEl = document.getElementById('wbApiStatus');
            const btn = document.getElementById('wbApiFetchBtn');
            const saveKey = document.getElementById('wbSaveKey').checked;

            if (!apiKey) { alert('Введите WB API ключ'); return; }
            if (!dateFrom || !dateTo) { alert('Укажите период'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Загрузка...';
            statusEl.style.display = 'block';
            statusEl.style.color = 'var(--text-secondary)';
            statusEl.textContent = 'Запрашиваем данные из WB API...';

            try {
                const res = await fetch(`${API_BASE}/api/fetch-from-wb`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        wb_api_key: apiKey,
                        date_from: dateFrom,
                        date_to: dateTo
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    statusEl.style.color = 'var(--accent-green)';
                    statusEl.textContent = `✓ ${data.message}`;
                    document.getElementById('fileInfo').style.display = 'flex';
                    document.getElementById('fileName').textContent = `${data.products_count} товаров (WB API)`;
                    // Save API key to localStorage if checkbox is checked
                    if (saveKey) {
                        localStorage.setItem('wb_api_key', apiKey);
                    }
                    loadDashboard();
                } else {
                    statusEl.style.color = 'var(--accent-red)';
                    statusEl.textContent = `Ошибка: ${data.detail}`;
                }
            } catch (e) {
                statusEl.style.color = 'var(--accent-red)';
                statusEl.textContent = `Ошибка подключения к серверу (${API_BASE}). Убедитесь что бэкенд запущен.`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '📊 Загрузить';
            }
        }

        // File upload
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', (e) => { e.preventDefault(); uploadZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]); });
        fileInput.addEventListener('change', (e) => { if (e.target.files[0]) uploadFile(e.target.files[0]); });

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            try {
                uploadZone.innerHTML = '<span class="spinner"></span> Загрузка...';
                const res = await fetch(`${API_BASE}/api/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('fileInfo').style.display = 'flex';
                    document.getElementById('fileName').textContent = `${data.products_count} товаров`;
                    uploadZone.innerHTML = '<span>📁</span> Загрузить Excel';
                    loadDashboard();
                } else {
                    alert('Ошибка: ' + data.detail);
                    uploadZone.innerHTML = '<span>📁</span> Загрузить Excel';
                }
            } catch (e) {
                alert('Ошибка подключения к серверу');
                uploadZone.innerHTML = '<span>📁</span> Загрузить Excel';
            }
        }

        async function loadDashboard() {
            try {
                const [summary, hits, outsiders, matrix, actions] = await Promise.all([
                    fetch(`${API_BASE}/api/dashboard/summary`).then(r => r.json()),
                    fetch(`${API_BASE}/api/dashboard/hits?limit=10`).then(r => r.json()),
                    fetch(`${API_BASE}/api/dashboard/outsiders?limit=10`).then(r => r.json()),
                    fetch(`${API_BASE}/api/dashboard/matrix`).then(r => r.json()),
                    fetch(`${API_BASE}/api/dashboard/actions`).then(r => r.json())
                ]);
                dashboardData = { summary, hits: hits.hits, outsiders: outsiders.outsiders, matrix: matrix.matrix, actions: actions.actions };
                renderCommandCenter();
                renderMatrix();
                renderActions();
            } catch (e) { console.error('Load error:', e); }
        }

        function renderKPI(label, icon, data, type = 'number') {
            const val = type === 'currency' ? formatCurrency(data.value) : type === 'pct' ? formatPct(data.value) : formatNumber(data.value);
            const prev = type === 'currency' ? formatCurrency(data.prev) : type === 'pct' ? formatPct(data.prev) : formatNumber(data.prev);
            const dyn = data.dynamics;
            const diff = data.diff;
            const cls = dynClass(dyn);

            return `
                <div class="kpi-card ${cls}">
                    <div class="kpi-label">${icon} ${label}</div>
                    <div class="kpi-value">${val}</div>
                    <div class="kpi-dynamics ${cls}">
                        ${dyn !== undefined ? `<span>${formatDynamics(dyn, type === 'pct' ? ' п.п.' : '%')}</span>` : ''}
                        ${diff !== undefined && diff !== 0 ? `<span class="kpi-diff ${cls}">${type === 'currency' ? formatDiff(diff) + ' ₽' : formatDiff(diff)}</span>` : ''}
                    </div>
                    ${data.prev !== undefined ? `<div class="kpi-prev">Пред. неделя: ${prev}</div>` : ''}
                </div>
            `;
        }

        function renderCommandCenter() {
            const { summary, hits, outsiders } = dashboardData;
            const kpi = summary.kpi;
            const funnel = summary.funnel;

            document.getElementById('commandContent').innerHTML = `
                <!-- Основные KPI -->
                <div class="kpi-grid">
                    ${renderKPI('Выручка (заказы)', '💰', kpi.revenue, 'currency')}
                    ${renderKPI('Заказы', '🛒', kpi.orders)}
                    ${renderKPI('Выкупы', '📦', kpi.purchased_value, 'currency')}
                    ${renderKPI('Процент выкупа', '✅', kpi.purchase_rate, 'pct')}
                </div>

                <!-- Дополнительные KPI -->
                <div class="kpi-grid-6">
                    ${renderKPI('Показы', '👁', kpi.impressions)}
                    ${renderKPI('CTR', '👆', kpi.ctr, 'pct')}
                    ${renderKPI('Конв. в корзину', '🛒', kpi.cart_conversion, 'pct')}
                    ${renderKPI('Конв. в заказ', '📝', kpi.order_conversion, 'pct')}
                    ${renderKPI('Средний чек', '💵', kpi.avg_order_value, 'currency')}
                    ${renderKPI('Отмены', '❌', kpi.cancelled_value, 'currency')}
                </div>

                <!-- AI Block -->
                <div class="ai-block">
                    <div class="ai-header">
                        <div class="ai-icon">🤖</div>
                        <div>
                            <div style="font-weight: 600;">ИИ-анализ недели</div>
                            <div style="font-size: 12px; color: var(--text-muted);">Powered by Claude Sonnet 4</div>
                        </div>
                    </div>
                    <div class="ai-content" id="aiContent">Нажмите кнопку для получения ИИ-анализа</div>
                    <button class="ai-button" id="aiButton" onclick="getAIAnalysis()">✨ Получить анализ</button>
                </div>

                <!-- Воронка и конверсии -->
                <div class="grid-2">
                    <div class="card">
                        <div class="card-title">📉 Воронка продаж (с динамикой к пред. неделе)</div>
                        ${renderFunnel(funnel)}
                    </div>
                    <div class="card">
                        <div class="card-title">📊 Конверсии</div>
                        ${renderConversions(funnel.conversions)}
                    </div>
                </div>

                <!-- Хиты и аутсайдеры -->
                <div class="grid-2">
                    <div class="card">
                        <div class="card-title">🔥 Хиты продаж</div>
                        ${renderHitsTable(hits)}
                    </div>
                    <div class="card">
                        <div class="card-title">⚠️ Аутсайдеры</div>
                        ${renderOutsidersTable(outsiders)}
                    </div>
                </div>
            `;
        }

        function renderFunnel(funnel) {
            const steps = [
                { key: 'impressions', label: 'Показы', color: '#8b5cf6' },
                { key: 'card_views', label: 'Переходы', color: '#6366f1' },
                { key: 'add_to_cart', label: 'Корзина', color: '#3b82f6' },
                { key: 'orders', label: 'Заказы', color: '#06b6d4' },
                { key: 'purchased', label: 'Выкуп', color: '#10b981' }
            ];
            const max = funnel.impressions?.value || 1;

            return steps.map((s, i) => {
                const data = funnel[s.key];
                const val = data?.value || 0;
                const prev = data?.prev || 0;
                const dyn = data?.dynamics || 0;
                const width = Math.max((val / max) * 100, 12);
                const cls = dynClass(dyn);

                return `
                    <div class="funnel-step">
                        <div class="funnel-bar" style="width: ${width}%; background: linear-gradient(90deg, ${s.color}, ${s.color}dd);">
                            <span>${s.label}</span>
                            <span style="font-weight: 700;">${formatNumber(val)}</span>
                        </div>
                        <div class="funnel-meta">
                            <span class="funnel-dynamics ${cls}">${formatDynamics(dyn)}</span>
                            <span style="color: var(--text-muted);">было ${formatNumber(prev)}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderConversions(conv) {
            const items = [
                { label: 'CTR (показы → переходы)', data: conv.ctr, target: 10 },
                { label: 'Корзина (переходы → корзина)', data: conv.cart_rate, target: 8 },
                { label: 'Заказ (корзина → заказ)', data: conv.order_rate, target: 20 },
                { label: 'Выкуп (заказ → выкуп)', data: conv.purchase_rate, target: 60 }
            ];
            return items.map(item => {
                const val = item.data?.value || 0;
                const prev = item.data?.prev || 0;
                const dyn = item.data?.dynamics || 0;
                const pct = Math.min((val / item.target) * 100, 100);
                const color = val >= item.target ? 'var(--accent-green)' : val >= item.target * 0.7 ? 'var(--accent-yellow)' : 'var(--accent-red)';
                const cls = dynClass(dyn);

                return `
                    <div style="margin-bottom: 16px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                            <span style="font-size: 13px; color: var(--text-secondary);">${item.label}</span>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <span style="font-weight: 600; color: ${color};">${val.toFixed(1)}%</span>
                                <span class="kpi-diff ${cls}" style="font-size: 11px;">${formatDynamics(dyn, ' п.п.')}</span>
                            </div>
                        </div>
                        <div style="height: 8px; background: var(--bg-secondary); border-radius: 4px; overflow: hidden;">
                            <div style="height: 100%; width: ${pct}%; background: ${color}; border-radius: 4px;"></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-top: 4px; font-size: 11px; color: var(--text-muted);">
                            <span>Пред. неделя: ${prev.toFixed(1)}%</span>
                            <span>Цель: ${item.target}%</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderHitsTable(hits) {
            if (!hits?.length) return '<p style="color: var(--text-muted);">Нет данных</p>';
            return `
                <table>
                    <thead><tr><th>#</th><th>Артикул / Товар</th><th>Выручка</th><th>Динамика</th><th>Остаток</th></tr></thead>
                    <tbody>
                        ${hits.map((h, i) => `
                            <tr>
                                <td style="color: var(--text-muted);">${i + 1}</td>
                                <td>
                                    <div style="font-weight: 600; color: var(--accent-purple); font-size: 12px;">${h.seller_article || h.wb_article || '-'}</div>
                                    <div style="max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px;">${h.name}</div>
                                </td>
                                <td style="font-weight: 600;">${formatCurrency(h.orders_value)}</td>
                                <td><span class="badge ${h.dynamics >= 0 ? 'badge-success' : 'badge-danger'}">${formatDynamics(h.dynamics)}</span></td>
                                <td>${h.stock === 0 ? '<span class="badge badge-danger">OOS</span>' : h.stock < 50 ? `<span class="badge badge-warning">${h.stock}</span>` : h.stock}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderOutsidersTable(outsiders) {
            if (!outsiders?.length) return '<p style="color: var(--text-muted);">Нет проблемных товаров</p>';
            const badgeClass = { 'Нет заказов': 'badge-danger', 'Низкий CTR': 'badge-warning', 'Низкий выкуп': 'badge-warning' };
            return `
                <table>
                    <thead><tr><th>Артикул / Товар</th><th>Проблема</th><th>Рекомендация</th></tr></thead>
                    <tbody>
                        ${outsiders.map(o => `
                            <tr>
                                <td>
                                    <div style="font-weight: 600; color: var(--accent-cyan); font-size: 12px;">${o.seller_article || o.wb_article || '-'}</div>
                                    <div style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px;">${o.name}</div>
                                    <div style="font-size: 10px; color: var(--text-muted);">${o.detail}</div>
                                </td>
                                <td><span class="badge ${badgeClass[o.issue] || 'badge-info'}">${o.issue}</span></td>
                                <td style="font-size: 12px; color: var(--accent-cyan);">${o.recommendation}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderMatrix() {
            const { matrix } = dashboardData;
            const quadrants = [
                { key: 'star', icon: '⭐', title: 'Звёзды', subtitle: 'Растут + продают', color: '#fbbf24' },
                { key: 'question', icon: '❓', title: 'Вопросы', subtitle: 'Растут, мало продаж', color: '#8b5cf6' },
                { key: 'cash_cow', icon: '💰', title: 'Дойные коровы', subtitle: 'Стабильно', color: '#10b981' },
                { key: 'dog', icon: '🐕', title: 'Собаки', subtitle: 'Падают', color: '#94a3b8' }
            ];

            document.getElementById('matrixContent').innerHTML = `
                <div style="display: flex; gap: 12px; margin-bottom: 24px;">
                    <button class="ai-button" onclick="exportMatrixToExcel('star')" style="background: linear-gradient(135deg, #fbbf24, #f59e0b);">📥 Выгрузить Звёзды</button>
                    <button class="ai-button" onclick="exportMatrixToExcel('question')" style="background: linear-gradient(135deg, #8b5cf6, #6366f1);">📥 Выгрузить Вопросы</button>
                    <button class="ai-button" onclick="exportMatrixToExcel('cash_cow')" style="background: linear-gradient(135deg, #10b981, #06b6d4);">📥 Выгрузить Коровы</button>
                    <button class="ai-button" onclick="exportMatrixToExcel('dog')" style="background: linear-gradient(135deg, #94a3b8, #64748b);">📥 Выгрузить Собаки</button>
                </div>

                <div class="bcg-grid">
                    ${quadrants.map(q => {
                        const data = matrix[q.key] || { count: 0, revenue: 0, items: [] };
                        return `
                            <div class="bcg-card ${q.key}">
                                <div class="bcg-header">
                                    <span class="bcg-icon">${q.icon}</span>
                                    <div>
                                        <div style="font-weight: 600; color: ${q.color};">${q.title}</div>
                                        <div style="font-size: 12px; color: var(--text-muted);">${q.subtitle}</div>
                                    </div>
                                </div>
                                <div class="bcg-stats">
                                    <div>
                                        <div class="bcg-stat-value">${formatNumber(data.count)}</div>
                                        <div class="bcg-stat-label">товаров</div>
                                    </div>
                                    <div>
                                        <div class="bcg-stat-value">${formatCurrency(data.revenue)}</div>
                                        <div class="bcg-stat-label">выручка</div>
                                    </div>
                                </div>
                                ${data.items?.slice(0, 5).map(item => `
                                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-top: 1px solid var(--border-color); font-size: 13px;">
                                        <div style="max-width: 150px;">
                                            <div style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.name}</div>
                                            <div style="font-size: 10px; color: var(--text-muted);">${item.seller_article || item.wb_article || ''}</div>
                                        </div>
                                        <span class="badge ${item.dynamics >= 0 ? 'badge-success' : 'badge-danger'}">${formatDynamics(item.dynamics)}</span>
                                    </div>
                                `).join('') || ''}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderActions() {
            const { actions, summary } = dashboardData;
            const kpi = summary.kpi;
            const currentRevenue = kpi?.revenue?.value || 0;
            const dynamics = kpi?.revenue?.dynamics || 0;
            const forecastWithout = Math.round(currentRevenue * (1 + dynamics / 100));
            const forecastWith = Math.round(currentRevenue * 1.15);
            const delta = forecastWith - forecastWithout;

            document.getElementById('actionsContent').innerHTML = `
                <div class="kpi-grid" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="kpi-card" style="border-top: 3px solid var(--accent-red);">
                        <div class="kpi-label">🔴 Критичных</div>
                        <div class="kpi-value" style="color: var(--accent-red);">${actions.critical?.length || 0}</div>
                    </div>
                    <div class="kpi-card" style="border-top: 3px solid var(--accent-yellow);">
                        <div class="kpi-label">🟡 Важных</div>
                        <div class="kpi-value" style="color: var(--accent-yellow);">${actions.important?.length || 0}</div>
                    </div>
                    <div class="kpi-card" style="border-top: 3px solid var(--accent-green);">
                        <div class="kpi-label">🟢 Возможностей</div>
                        <div class="kpi-value" style="color: var(--accent-green);">${actions.opportunities?.length || 0}</div>
                    </div>
                </div>

                <div style="display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;">
                    <button class="ai-button" onclick="exportActionsToExcel('critical')" style="background: linear-gradient(135deg, var(--accent-red), #dc2626);">📥 Выгрузить критичные</button>
                    <button class="ai-button" onclick="exportActionsToExcel('important')" style="background: linear-gradient(135deg, var(--accent-yellow), #d97706);">📥 Выгрузить важные</button>
                    <button class="ai-button" onclick="exportActionsToExcel('opportunities')" style="background: linear-gradient(135deg, var(--accent-green), #059669);">📥 Выгрузить возможности</button>
                    <button class="ai-button" onclick="exportActionsToExcel('all')" style="background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));">📥 Выгрузить все рекомендации</button>
                </div>

                <div class="grid-2">
                    <div class="card">
                        <div class="card-title">⚡ Срочные действия</div>
                        ${['critical', 'important', 'opportunities'].map(type => {
                            const items = actions[type] || [];
                            if (!items.length) return '';
                            const labels = { critical: '🔴 Критично', important: '🟡 Важно', opportunities: '🟢 Возможности' };
                            return `
                                <div style="margin-bottom: 16px;">
                                    <div style="font-weight: 600; margin-bottom: 12px; color: var(--accent-${type === 'critical' ? 'red' : type === 'important' ? 'yellow' : 'green'});">${labels[type]}</div>
                                    ${items.map(a => `
                                        <div class="action-card ${type}">
                                            <div class="action-title">${a.title}</div>
                                            <div class="action-desc">${a.description}</div>
                                            <div class="action-meta">${a.potential ? `<span class="action-potential">Потенциал: ${formatCurrency(a.potential)}</span> · ` : ''}${a.items_count} товаров</div>
                                        </div>
                                    `).join('')}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <div>
                        <div class="card" style="background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(6, 182, 212, 0.1)); border-color: rgba(16, 185, 129, 0.3);">
                            <div class="card-title">🎯 Прогноз на следующую неделю</div>
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; text-align: center;">
                                <div>
                                    <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">Без действий</div>
                                    <div style="font-size: 22px; font-weight: 700; color: ${dynamics < 0 ? 'var(--accent-red)' : 'var(--text-primary)'};">${formatCurrency(forecastWithout)}</div>
                                    <div style="font-size: 12px; color: ${dynamics < 0 ? 'var(--accent-red)' : 'var(--text-muted)'};">${formatDynamics(dynamics)}</div>
                                </div>
                                <div>
                                    <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">С рекомендациями</div>
                                    <div style="font-size: 22px; font-weight: 700; color: var(--accent-green);">${formatCurrency(forecastWith)}</div>
                                    <div style="font-size: 12px; color: var(--accent-green);">+15%</div>
                                </div>
                                <div>
                                    <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">Дельта</div>
                                    <div style="font-size: 22px; font-weight: 700; color: var(--accent-cyan);">+${formatCurrency(delta)}</div>
                                    <div style="font-size: 12px; color: var(--accent-cyan);">потенциал</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function getAIAnalysis() {
            const button = document.getElementById('aiButton');
            const content = document.getElementById('aiContent');
            if (!button || !content) return;

            button.disabled = true;
            button.innerHTML = '<span class="spinner"></span> Анализирую...';
            content.textContent = 'Анализирую данные...';

            try {
                const res = await fetch(`${API_BASE}/api/ai/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ focus: 'general' })
                });
                const data = await res.json();
                if (res.ok) {
                    content.textContent = data.analysis;
                } else {
                    content.textContent = 'Ошибка: ' + data.detail;
                }
            } catch (e) {
                content.textContent = 'Ошибка подключения к API';
            }
            button.disabled = false;
            button.innerHTML = '✨ Обновить анализ';
        }

        // Excel export functions
        function exportMatrixToExcel(category) {
            const { matrix } = dashboardData;
            const data = matrix[category];
            if (!data || !data.items?.length) {
                alert('Нет данных для выгрузки');
                return;
            }

            const categoryNames = { star: 'Звёзды', question: 'Вопросы', cash_cow: 'Дойные_коровы', dog: 'Собаки' };
            const headers = ['Артикул продавца', 'Артикул WB', 'Название', 'Выручка', 'Динамика %', 'Заказы шт', 'Остаток'];
            const rows = data.items.map(item => [
                item.seller_article || '',
                item.wb_article || '',
                item.name || '',
                item.orders_value || 0,
                item.dynamics || 0,
                item.orders_qty || 0,
                item.stock || 0
            ]);

            downloadCSV([headers, ...rows], `BCG_${categoryNames[category]}_${new Date().toISOString().split('T')[0]}.csv`);
        }

        function exportActionsToExcel(type) {
            const { actions } = dashboardData;
            let items = [];

            if (type === 'all') {
                ['critical', 'important', 'opportunities'].forEach(t => {
                    const actionList = actions[t] || [];
                    actionList.forEach(action => {
                        if (action.items) {
                            action.items.forEach(item => {
                                items.push({ ...item, action_type: t, action_title: action.title });
                            });
                        }
                    });
                });
            } else {
                const actionList = actions[type] || [];
                actionList.forEach(action => {
                    if (action.items) {
                        action.items.forEach(item => {
                            items.push({ ...item, action_type: type, action_title: action.title });
                        });
                    }
                });
            }

            if (!items.length) {
                alert('Нет данных для выгрузки. Возможно, рекомендации не содержат списка артикулов.');
                return;
            }

            const headers = ['Тип', 'Рекомендация', 'Артикул продавца', 'Артикул WB', 'Название', 'Выручка', 'Динамика %'];
            const rows = items.map(item => [
                item.action_type || '',
                item.action_title || '',
                item.seller_article || '',
                item.wb_article || '',
                item.name || '',
                item.orders_value || 0,
                item.dynamics || 0
            ]);

            const typeNames = { critical: 'Критичные', important: 'Важные', opportunities: 'Возможности', all: 'Все' };
            downloadCSV([headers, ...rows], `Рекомендации_${typeNames[type]}_${new Date().toISOString().split('T')[0]}.csv`);
        }

        function downloadCSV(data, filename) {
            const BOM = '\uFEFF';
            const csv = BOM + data.map(row => row.map(cell => {
                const str = String(cell);
                if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                    return '"' + str.replace(/"/g, '""') + '"';
                }
                return str;
            }).join(';')).join('\n');

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }

        // Check if data already loaded
        fetch(`${API_BASE}/health`).then(r => r.json()).then(data => {
            if (data.data_loaded) loadDashboard();
        }).catch(() => {});
    </script>
</body>
